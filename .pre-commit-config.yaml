---
exclude: '(^|/)package-lock\.json$'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]  # Allow custom tags like GitHub Actions
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
      - id: pretty-format-json
        args: [--autofix, --indent=2]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: ed81924a8b1cecdaa570b072528fa80c9c4d6ccd  # frozen: 0.37.1
    hooks:
      - id: check-github-workflows
      - id: check-github-actions

  # mdformat disabled due to CI/local inconsistency
  # The hook passes locally but fails in CI with "files were modified"
  # despite identical mdformat versions and line ending enforcement
  # - repo: https://github.com/executablebooks/mdformat
  #   rev: 2d496dbc18e31b83a1596685347ffe0b6041daf0  # frozen: 1.0.0
  #   hooks:
  #     - id: mdformat
  #       additional_dependencies:
  #         - mdformat-gfm==1.0.0
  #       files: '^(README\.md|CLAUDE\.md|docs/.*\.md|[^/]+/README\.md|[^/]+/.*\.md)$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: b831c3dc5d27d9da294ae4e915773b99aa24a7c5  # frozen: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Mypy configured as local hook - see local hooks section below

  - repo: https://github.com/PyCQA/bandit
    rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08  # frozen: 1.9.4
    hooks:
      - id: bandit
        args: [-x, "tests", -s, "B608"]  # B608 skipped: all user input uses parameterized %s queries

  - repo: https://github.com/hadolint/hadolint
    rev: 4e697ba704fd23b2409b947a319c19c3ee54d24f  # frozen: v2.14.0
    hooks:
      - id: hadolint

  - repo: https://github.com/IamTheFij/docker-pre-commit
    rev: f626253b23de45412865c07fd076ff95d4cd77a7  # frozen: v3.0.1
    hooks:
      - id: docker-compose-check
        files: ^docker-compose\.yml$  # Only check main file, not overlays like .prod.yml

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint
        args: ["-ignore", "SC2129"]  # Ignore "consider using { cmd1; cmd2; }" suggestion

  - repo: https://github.com/adrienverge/yamllint
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict, -c=.yamllint]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95  # frozen: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--shell=bash, --severity=warning]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: 05c1426671b9237fb5e1444dd63aa5731bec0dfb  # frozen: v3.13.1-1
    hooks:
      - id: shfmt
        name: Check shell style with shfmt for database scripts
        args:
          - --indent=2
          - --case-indent
          - --language-dialect=bash
          - --write
          - scripts/reset-password.sh
          - scripts/test-database-resilience.sh
          - scripts/migrate-master-year-to-int.sh
          - scripts/compute-label-stats.sh
      - id: shfmt
        name: Check shell style with shfmt for infrastructure scripts
        args:
          - --indent=2
          - --case-indent
          - --language-dialect=bash
          - --write
          - scripts/neo4j-entrypoint.sh
          - scripts/create-secrets.sh
          - scripts/migrate-encryption-key.sh
          - tests/perftest/entrypoint.sh
      - id: shfmt
        name: Check shell style with shfmt for project scripts
        args:
          - --indent=2
          - --case-indent
          - --language-dialect=bash
          - --write
          - scripts/update-project.sh

  # Local hooks
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ["."]
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd extractor 2>/dev/null && cargo fmt --check || exit 0'
        language: system
        files: '^extractor/.*\.rs$'
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'cd extractor 2>/dev/null && cargo clippy --all-targets -- -D warnings || exit 0'
        language: system
        files: '^extractor/.*\.rs$'
        pass_filenames: false
