---
# Discogsography API Performance Test Configuration
#
# Customize this file to test different entities against your dataset.
# All entity names must exist in your Neo4j graph for meaningful results.

api_base_url: "http://api:8004"
health_url: "http://api:8005/health"

# Database connections for index listing (optional — skipped if unavailable)
neo4j_uri: "bolt://neo4j:7687"
neo4j_user: "neo4j"
neo4j_password: "discogsography"
postgres_url: "postgresql://discogsography:discogsography@postgres:5432/discogsography"

# Number of times each endpoint is called (for statistical accuracy)
iterations: 3

# HTTP request timeout in seconds
timeout: 30

# Health check: how many times to retry before giving up
health_retries: 30

# Health check: seconds between retries
health_interval: 5

artists:
  - Indecent Noise
  - Solarstone
  - Green Day
  - Johnny Cash

genres:
  - Electronic
  - Rock

styles:
  - Trance
  - Hard Trance
  - Progressive Trance

labels:
  - Hooj Choons
  - Reprise Records
  - Tracid Traxx

# Credits & Provenance — credited personnel for person-based queries
credited_persons:
  - Bob Ludwig
  - Flood
  - Alan Moulder

# Role categories for leaderboard tests
credit_role_categories:
  - mastering
  - production
  - engineering

# Natural Language Query (NLQ) scenarios
nlq_scenarios:
  - name: nlq_query_simple
    method: POST
    path: /api/nlq/query
    body:
      query: "Most prolific electronic label"
    target_p95_ms: 4000

  - name: nlq_suggestions
    method: GET
    path: /api/nlq/suggestions
    query_params:
      pane: "explore"
    target_p95_ms: 200

# Digger user-facing endpoints (all require an authenticated user).
# Run with `--seed` so these hit pre-seeded rows for the fixed perftest user.
# `auth: true` makes the runner attach a minted Bearer token whose `sub` matches
# the seeded users row. The PUT/bulk-tier scenarios target release_id 12345,
# which the seed step inserts into the user's wantlist priorities.
digger_scenarios:
  - name: digger_settings_get
    method: GET
    path: /api/digger/settings
    auth: true
    target_p95_ms: 200

  - name: digger_wantlist_get
    method: GET
    path: /api/digger/wantlist
    auth: true
    target_p95_ms: 500

  - name: digger_wantlist_priority_put
    method: PUT
    path: /api/digger/wantlist/{release_id}/priority
    path_params:
      release_id: 12345
    body:
      tier: nice
    auth: true
    target_p95_ms: 300

  - name: digger_wantlist_bulk_tier_post
    method: POST
    path: /api/digger/wantlist/bulk-tier
    body:
      release_ids: [12345]
      tier: nice
    auth: true
    target_p95_ms: 300

  - name: digger_reports_list
    method: GET
    path: /api/digger/reports
    auth: true
    target_p95_ms: 200

  # Fetch one report by id. The --seed step inserts a digger.reports row carrying
  # this fixed UUID (owned by the perftest user) so this resolves a real report.
  - name: digger_reports_get
    method: GET
    path: /api/digger/reports/{report_id}
    path_params:
      report_id: 00000000-0000-0000-0000-0000000d2222
    auth: true
    target_p95_ms: 100

  # Mark that report read. mark_read is one-shot (UPDATE ... WHERE read_at IS NULL):
  # the seed resets read_at to NULL each run, so the first of the N iterations is a
  # 204 and the rest are 404 (already read). Both measure the same UPDATE round-trip;
  # the harness reports errors informationally and does not fail on them.
  - name: digger_reports_read
    method: POST
    path: /api/digger/reports/{report_id}/read
    path_params:
      report_id: 00000000-0000-0000-0000-0000000d2222
    auth: true
    target_p95_ms: 100

  # Interactive recommendation. Streams Server-Sent Events (refresh_started ->
  # refresh_progress* -> result -> done); like the NLQ scenarios above, the harness
  # issues a plain POST and times the full response (the EventSourceResponse closes
  # once the generator completes). The seed keeps the wantlist release fresh
  # (last_scraped_at = now()) so there is no opportunistic-refresh wait and the
  # deadline only caps the worst case.
  - name: digger_recommend
    method: POST
    path: /api/digger/recommend
    body:
      deadline_seconds: 5
    auth: true
    target_p95_ms: 6000

  # Agent session list — a cheap authenticated GET (newest sessions first).
  - name: digger_agent_sessions
    method: GET
    path: /api/digger/agent/sessions
    auth: true
    target_p95_ms: 200

  # Pending tier-change proposals — a cheap authenticated GET.
  - name: digger_proposals_list
    method: GET
    path: /api/digger/proposals
    auth: true
    target_p95_ms: 200

  # Interactive agent chat turn (LLM-backed). Streams typed SSE events
  # (text/tool_call/tool_result/bundle_card/proposal_card/done); like the NLQ +
  # recommend scenarios the harness issues a plain POST and times the full
  # response. Requires the API to be configured with ANTHROPIC_API_KEY and the
  # seeded user to be digger-enabled; without a key the turn errors, which the
  # harness reports informationally (it does not gate on errors). Operators may
  # exclude this from routine runs with --only / --skip since each turn calls the
  # model and incurs cost.
  - name: digger_agent_message
    method: POST
    path: /api/digger/agent/message
    body:
      user_message: "summarize my wantlist"
    auth: true
    target_p95_ms: 12000
