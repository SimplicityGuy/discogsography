---
# Discogsography API Performance Test Configuration
#
# Customize this file to test different entities against your dataset.
# All entity names must exist in your Neo4j graph for meaningful results.

api_base_url: "http://api:8004"
health_url: "http://api:8005/health"

# Database connections for index listing (optional — skipped if unavailable)
neo4j_uri: "bolt://neo4j:7687"
neo4j_user: "neo4j"
neo4j_password: "discogsography"
postgres_url: "postgresql://discogsography:discogsography@postgres:5432/discogsography"

# Number of times each endpoint is called (for statistical accuracy)
iterations: 3

# HTTP request timeout in seconds
timeout: 30

# Health check: how many times to retry before giving up
health_retries: 30

# Health check: seconds between retries
health_interval: 5

artists:
  - Indecent Noise
  - Solarstone
  - Green Day
  - Johnny Cash

genres:
  - Electronic
  - Rock

styles:
  - Trance
  - Hard Trance
  - Progressive Trance

labels:
  - Hooj Choons
  - Reprise Records
  - Tracid Traxx

# Credits & Provenance — credited personnel for person-based queries
credited_persons:
  - Bob Ludwig
  - Flood
  - Alan Moulder

# Role categories for leaderboard tests
credit_role_categories:
  - mastering
  - production
  - engineering

# Natural Language Query (NLQ) scenarios
nlq_scenarios:
  - name: nlq_query_simple
    method: POST
    path: /api/nlq/query
    body:
      query: "Most prolific electronic label"
    target_p95_ms: 4000

  - name: nlq_suggestions
    method: GET
    path: /api/nlq/suggestions
    query_params:
      pane: "explore"
    target_p95_ms: 200

# Digger user-facing endpoints (all require an authenticated user).
# Run with `--seed` so these hit pre-seeded rows for the fixed perftest user.
# `auth: true` makes the runner attach a minted Bearer token whose `sub` matches
# the seeded users row. The PUT/bulk-tier scenarios target release_id 12345,
# which the seed step inserts into the user's wantlist priorities.
digger_scenarios:
  - name: digger_settings_get
    method: GET
    path: /api/digger/settings
    auth: true
    target_p95_ms: 200

  - name: digger_wantlist_get
    method: GET
    path: /api/digger/wantlist
    auth: true
    target_p95_ms: 500

  - name: digger_wantlist_priority_put
    method: PUT
    path: /api/digger/wantlist/{release_id}/priority
    path_params:
      release_id: 12345
    body:
      tier: nice
    auth: true
    target_p95_ms: 300

  - name: digger_wantlist_bulk_tier_post
    method: POST
    path: /api/digger/wantlist/bulk-tier
    body:
      release_ids: [12345]
      tier: nice
    auth: true
    target_p95_ms: 300

  - name: digger_reports_list
    method: GET
    path: /api/digger/reports
    auth: true
    target_p95_ms: 200
