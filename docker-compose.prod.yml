---
# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Note: When using deploy.replicas, container_name from base config is ignored
#
# Secrets: populate secrets/ from secrets.example/ and run scripts/create-secrets.sh
# See: scripts/create-secrets.sh for automated secret generation

secrets:
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt
  neo4j_password:
    file: ./secrets/neo4j_password.txt
  encryption_master_key:
    file: ./secrets/encryption_master_key.txt
  # Required for email delivery — create with: scripts/create-secrets.sh or manually
  brevo_api_key:
    file: ./secrets/brevo_api_key.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  postgres_username:
    file: ./secrets/postgres_username.txt
  rabbitmq_password:
    file: ./secrets/rabbitmq_password.txt
  rabbitmq_username:
    file: ./secrets/rabbitmq_username.txt

services:
  rabbitmq:
    restart: always
    environment:
      RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_DEFAULT_USER_FILE: /run/secrets/rabbitmq_username
    secrets:
      - rabbitmq_password
      - rabbitmq_username

  postgres:
    restart: always
    command:
      - "postgres"
      # --- Memory ---
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "huge_pages=try"
      # --- WAL / Checkpoints ---
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      # --- I/O (SSD-optimized) ---
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "seq_page_cost=1.0"
      # --- Parallelism ---
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      - "-c"
      - "parallel_leader_participation=on"
      # --- Query Planner ---
      - "-c"
      - "default_statistics_target=200"
      - "-c"
      - "jit=on"
      # --- Connections ---
      - "-c"
      - "max_connections=100"
      # --- Logging / Diagnostics ---
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_temp_files=0"
      # --- Autovacuum Tuning ---
      - "-c"
      - "autovacuum_max_workers=4"
      - "-c"
      - "autovacuum_vacuum_scale_factor=0.05"
      - "-c"
      - "autovacuum_analyze_scale_factor=0.025"
      - "-c"
      - "autovacuum_vacuum_cost_delay=2ms"
    environment:
      POSTGRES_DB: discogsography
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USER_FILE: /run/secrets/postgres_username
    secrets:
      - postgres_username
      - postgres_password

  neo4j:
    restart: always
    entrypoint: ["/scripts/neo4j-entrypoint.sh"]
    command: ["neo4j"]
    volumes:
      - ./scripts/neo4j-entrypoint.sh:/scripts/neo4j-entrypoint.sh:ro
    secrets:
      - neo4j_password
    environment:
      JAVA_TOOL_OPTIONS: '--enable-native-access=ALL-UNNAMED'
      NEO4J_dbms_memory_transaction_total_max: 8G
      # --- Memory: heap 8G + page cache 16G = ~24G (fits 25GB store in cache) ---
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_SIZE:-8g}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_SIZE:-8g}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-16g}
      NEO4J_server_memory_pagecache_flush_buffer_size__in__pages: '512'
      # --- JVM Tuning for large heap with 131M relationships ---
      NEO4J_server_jvm_additional: >-
        -XX:+UseG1GC
        -XX:G1HeapRegionSize=16m
        -XX:+AlwaysPreTouch
        -XX:+DisableExplicitGC
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseCompressedOops
        -XX:MaxGCPauseMillis=200
        -XX:G1ReservePercent=15
        -XX:InitiatingHeapOccupancyPercent=45
        -XX:SurvivorRatio=8
        -XX:+ParallelRefProcEnabled
        -XX:FlightRecorderOptions=stackdepth=256
        --add-modules jdk.incubator.vector
        --enable-native-access=ALL-UNNAMED
      # --- I/O and Checkpointing ---
      NEO4J_db_checkpoint_iops_limit: '4000'
      NEO4J_db_checkpoint_interval_time: '15m'
      NEO4J_db_checkpoint_interval_tx: '1000000'
      # --- Query Logging ---
      NEO4J_db_logs_query_threshold: '5s'
      NEO4J_db_logs_query_plan__description__enabled: 'true'
      # --- Transaction ---
      NEO4J_db_transaction_timeout: '600s'
      NEO4J_db_transaction_bookmark__ready__timeout: '30s'
      # --- Cypher Runtime ---
      NEO4J_dbms_cypher_min__replan__interval: '5s'
      NEO4J_dbms_cypher_statistics__divergence__threshold: '0.1'
      # --- Bolt Thread Pool ---
      NEO4J_server_bolt_thread__pool__min__size: '10'
      NEO4J_server_bolt_thread__pool__max__size: '400'
      NEO4J_server_bolt_connection__keep__alive__for__requests: 'ALL'
      NEO4J_server_bolt_connection__keep__alive: '30m'
    deploy:
      resources:
        limits:
          memory: ${NEO4J_MEMORY_LIMIT:-48G}

  schema-init:
    environment:
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USERNAME_FILE: /run/secrets/postgres_username
    secrets:
      - neo4j_password
      - postgres_username
      - postgres_password

  api:
    restart: always
    environment:
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      ENCRYPTION_MASTER_KEY_FILE: /run/secrets/encryption_master_key
      # Optional — Brevo email (when not set, password reset links are logged)
      BREVO_API_KEY_FILE: /run/secrets/brevo_api_key
      BREVO_SENDER_EMAIL: "${BREVO_SENDER_EMAIL:-noreply@discogsography.com}"
      BREVO_SENDER_NAME: "${BREVO_SENDER_NAME:-Discogsography}"
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USERNAME_FILE: /run/secrets/postgres_username
    secrets:
      - jwt_secret_key
      - neo4j_password
      - encryption_master_key
      - brevo_api_key
      - postgres_username
      - postgres_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  extractor-discogs:
    restart: always
    environment:
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_USERNAME_FILE: /run/secrets/rabbitmq_username
    secrets:
      - rabbitmq_username
      - rabbitmq_password
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  extractor-musicbrainz:
    restart: always
    environment:
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_USERNAME_FILE: /run/secrets/rabbitmq_username
    secrets:
      - rabbitmq_username
      - rabbitmq_password
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  graphinator:
    restart: always
    environment:
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_USERNAME_FILE: /run/secrets/rabbitmq_username
    secrets:
      - neo4j_password
      - rabbitmq_username
      - rabbitmq_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  tableinator:
    restart: always
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USERNAME_FILE: /run/secrets/postgres_username
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_USERNAME_FILE: /run/secrets/rabbitmq_username
    secrets:
      - rabbitmq_username
      - rabbitmq_password
      - postgres_username
      - postgres_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  brainzgraphinator:
    restart: always
    environment:
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_USERNAME_FILE: /run/secrets/rabbitmq_username
    secrets:
      - neo4j_password
      - rabbitmq_username
      - rabbitmq_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  brainztableinator:
    restart: always
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USERNAME_FILE: /run/secrets/postgres_username
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_USERNAME_FILE: /run/secrets/rabbitmq_username
    secrets:
      - rabbitmq_username
      - rabbitmq_password
      - postgres_username
      - postgres_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  dashboard:
    restart: always
    environment:
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USERNAME_FILE: /run/secrets/postgres_username
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_USERNAME_FILE: /run/secrets/rabbitmq_username
    secrets:
      - neo4j_password
      - postgres_username
      - postgres_password
      - rabbitmq_username
      - rabbitmq_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  explore:
    restart: always
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  insights:
    restart: always
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USERNAME_FILE: /run/secrets/postgres_username
    secrets:
      - postgres_username
      - postgres_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
