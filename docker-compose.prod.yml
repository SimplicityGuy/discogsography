---
# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Note: When using deploy.replicas, container_name from base config is ignored
#
# Secrets: populate secrets/ from secrets.example/ and run scripts/create-secrets.sh
# See: scripts/create-secrets.sh for automated secret generation

secrets:
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt
  neo4j_password:
    file: ./secrets/neo4j_password.txt
  oauth_encryption_key:
    file: ./secrets/oauth_encryption_key.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  postgres_username:
    file: ./secrets/postgres_username.txt
  rabbitmq_password:
    file: ./secrets/rabbitmq_password.txt
  rabbitmq_username:
    file: ./secrets/rabbitmq_username.txt

services:
  rabbitmq:
    restart: always
    environment:
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}

  postgres:
    restart: always
    environment:
      POSTGRES_DB: discogsography
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USER_FILE: /run/secrets/postgres_username
    secrets:
      - postgres_username
      - postgres_password

  neo4j:
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_SIZE:-2G}

  schema-init:
    environment:
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USERNAME_FILE: /run/secrets/postgres_username
    secrets:
      - neo4j_password
      - postgres_username
      - postgres_password

  api:
    restart: always
    environment:
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      OAUTH_ENCRYPTION_KEY_FILE: /run/secrets/oauth_encryption_key
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USERNAME_FILE: /run/secrets/postgres_username
    secrets:
      - jwt_secret_key
      - neo4j_password
      - oauth_encryption_key
      - postgres_username
      - postgres_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  extractor:
    restart: always
    environment:
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_USERNAME_FILE: /run/secrets/rabbitmq_username
    secrets:
      - rabbitmq_username
      - rabbitmq_password
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  graphinator:
    restart: always
    environment:
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_USERNAME_FILE: /run/secrets/rabbitmq_username
    secrets:
      - neo4j_password
      - rabbitmq_username
      - rabbitmq_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  tableinator:
    restart: always
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USERNAME_FILE: /run/secrets/postgres_username
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_USERNAME_FILE: /run/secrets/rabbitmq_username
    secrets:
      - rabbitmq_username
      - rabbitmq_password
      - postgres_username
      - postgres_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  dashboard:
    restart: always
    environment:
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USERNAME_FILE: /run/secrets/postgres_username
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_USERNAME_FILE: /run/secrets/rabbitmq_username
    secrets:
      - neo4j_password
      - postgres_username
      - postgres_password
      - rabbitmq_username
      - rabbitmq_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  explore:
    restart: always
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  insights:
    restart: always
    environment:
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USERNAME_FILE: /run/secrets/postgres_username
    secrets:
      - neo4j_password
      - postgres_username
      - postgres_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
