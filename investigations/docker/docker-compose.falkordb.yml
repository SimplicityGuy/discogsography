---
services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: bench-falkordb
    ports:
      - "6380:6379"
    volumes:
      - falkordb_bench_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  falkordb_bench_data:
