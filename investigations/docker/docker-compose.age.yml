---
services:
  postgres-age:
    image: apache/age:latest
    container_name: bench-age
    environment:
      POSTGRES_DB: discogsography
      POSTGRES_USER: discogsography
      POSTGRES_PASSWORD: discogsography
    ports:
      - "5433:5432"
    volumes:
      - age_bench_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discogsography"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  age_bench_data:
