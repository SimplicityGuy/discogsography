---
# Prepare the controller, run calibration on database hosts, and kick off
# benchmarks in the background on the controller.
#
# The benchmark runner script runs under nohup so it continues after this
# playbook exits. Use fetch-results.yml to check progress and download results.
#
# Usage:
#   ansible-playbook playbooks/run-benchmarks.yml

- name: Setup controller host
  hosts: bench-controller
  become: true

  tasks:
    - name: Install Python and uv
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present

    - name: Install uv
      ansible.builtin.shell: curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: /root/.local/bin/uv

    - name: Create benchmark workspace
      ansible.builtin.file:
        path: /opt/benchmark/discogsography
        state: directory
        mode: "0755"

    - name: Sync investigation code to controller
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../"
        dest: /opt/benchmark/discogsography/
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=__pycache__"
          - "--exclude=.mypy_cache"
          - "--exclude=node_modules"
      delegate_to: localhost

    - name: Install Python dependencies on controller
      ansible.builtin.shell: |
        export PATH="/root/.local/bin:$PATH"
        cd /opt/benchmark/discogsography
        uv sync --all-extras --extra investigations
      args:
        chdir: /opt/benchmark/discogsography

- name: Run hardware calibration on database hosts
  hosts: databases

  tasks:
    - name: Copy calibration script to database hosts
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../calibration/calibrate.py"
        dest: /opt/benchmark/calibrate.py
        mode: "0644"

    - name: Run hardware calibration on database host
      ansible.builtin.command:
        cmd: python3 /opt/benchmark/calibrate.py run --output /opt/benchmark/results/calibration.json
        creates: /opt/benchmark/results/calibration.json

- name: Deploy and start benchmark runner
  hosts: bench-controller
  become: true
  vars:
    benchmark_dir: /opt/benchmark/discogsography
    results_dir: /opt/benchmark/results
    scales:
      - small
      - large
    databases:
      - name: neo4j
        host: "{{ hostvars['bench-neo4j']['ansible_host'] }}"
        port: 7687
        uri_prefix: "bolt://"
        user: neo4j
        password: discogsography
      - name: memgraph
        host: "{{ hostvars['bench-memgraph']['ansible_host'] }}"
        port: 7687
        uri_prefix: "bolt://"
        user: ""
        password: ""
      - name: age
        host: "{{ hostvars['bench-age']['ansible_host'] }}"
        port: 5432
        uri_prefix: "postgresql://discogsography:discogsography@"
        uri_suffix: "/discogsography"
        user: ""
        password: ""
      - name: falkordb
        host: "{{ hostvars['bench-falkordb']['ansible_host'] }}"
        port: 6379
        uri_prefix: "redis://"
        user: ""
        password: ""
      - name: arangodb
        host: "{{ hostvars['bench-arangodb']['ansible_host'] }}"
        port: 8529
        uri_prefix: "http://"
        user: root
        password: discogsography

  tasks:
    - name: Create results directory
      ansible.builtin.file:
        path: "{{ results_dir }}"
        state: directory
        mode: "0755"

    - name: Deploy benchmark runner script
      ansible.builtin.template:
        src: ../templates/run-benchmarks.sh.j2
        dest: /opt/benchmark/run-benchmarks.sh
        mode: "0755"

    - name: Check if benchmarks are already running
      ansible.builtin.stat:
        path: /opt/benchmark/benchmark.pid
      register: pid_file

    - name: Start benchmarks in background
      ansible.builtin.shell: |
        nohup bash /opt/benchmark/run-benchmarks.sh > /opt/benchmark/benchmark.log 2>&1 &
      when: not pid_file.stat.exists

    - name: Show status
      ansible.builtin.debug:
        msg: >
          Benchmarks started in background on controller.
          Monitor: ssh -i ~/.ssh/benchmark-key bench@{{ ansible_host }} 'tail -f /opt/benchmark/benchmark.log'
          Fetch results: ansible-playbook playbooks/fetch-results.yml
