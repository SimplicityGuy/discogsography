---
# Check benchmark status and fetch all results to local machine.
#
# All results (benchmark data, logs, calibration, metrics) are fetched
# into a single directory: investigations/results/
#
# File naming convention: {db}-{what}-{timestamp}
#   Results:     {db}-{scale}-{timestamp}.json
#   Logs:        {db}-benchmark.log, {db}-error.log
#   Sentinels:   {db}.done, {db}.err, {db}.timeout, {db}.start
#   Calibration: {db}-calibration.json, baseline-calibration.json
#   Metrics:     {db}-system-metrics.jsonl
#
# Safe to run while benchmarks are still running — it will show progress
# and fetch whatever results exist so far. Run again after completion
# to get the full set.
#
# Usage:
#   ansible-playbook playbooks/fetch-results.yml

- name: Check benchmark status and fetch results from controller
  hosts: bench-controller

  vars:
    local_results_dir: "{{ playbook_dir }}/../../results/"

  tasks:
    - name: List per-database log files
      ansible.builtin.find:
        paths: /opt/benchmark
        patterns: "*-benchmark.log"
      register: db_log_files

    - name: Show recent log output per database
      ansible.builtin.command: "tail -20 {{ item.path }}"
      register: log_tails
      loop: "{{ db_log_files.files }}"
      changed_when: false
      ignore_errors: true

    - name: Display recent logs
      ansible.builtin.debug:
        msg: "{{ item.item.path | basename }}:\n{{ item.stdout }}"
      loop: "{{ log_tails.results }}"
      when: item.stdout | default('') | length > 0

    - name: List result files on controller
      ansible.builtin.find:
        paths: /opt/benchmark/results
        patterns: "*.json,*.txt,*.jsonl,*.done,*.err,*.timeout,*.start,*.log"
      register: result_files

    - name: Identify completed databases
      ansible.builtin.find:
        paths: /opt/benchmark/results
        patterns: "*.done"
      register: done_files

    - name: Identify errored databases
      ansible.builtin.find:
        paths: /opt/benchmark/results
        patterns: "*.err"
      register: err_files

    - name: Identify timed out databases
      ansible.builtin.find:
        paths: /opt/benchmark/results
        patterns: "*.timeout"
      register: timeout_files

    - name: Identify running databases
      ansible.builtin.find:
        paths: /opt/benchmark
        patterns: "*-benchmark.pid"
      register: pid_files

    - name: Display result count
      ansible.builtin.debug:
        msg: >-
          Found {{ result_files.files | length }} result files on controller:
          {{ done_files.files | length }} completed,
          {{ err_files.files | length }} errored,
          {{ timeout_files.files | length }} timed out,
          {{ pid_files.files | length }} still running.

    - name: Display errored databases
      ansible.builtin.debug:
        msg: "ERROR: {{ item.path | basename | regex_replace('\\.err$', '') }} had failures — see error log in results"
      loop: "{{ err_files.files }}"
      when: err_files.files | length > 0

    - name: Fetch benchmark results to local machine
      ansible.builtin.fetch:
        src: "{{ item.path }}"
        dest: "{{ local_results_dir }}"
        flat: true
      loop: "{{ result_files.files }}"

    - name: Fetch per-database logs to local machine
      ansible.builtin.fetch:
        src: "{{ item.path }}"
        dest: "{{ local_results_dir }}"
        flat: true
      loop: "{{ db_log_files.files }}"

    - name: Find synthetic data files
      ansible.builtin.find:
        paths: /opt/benchmark/data
        patterns: "*.json.gz"
      register: data_files

    - name: Ensure local data directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../data/"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false
      when: data_files.files | length > 0

    - name: Fetch synthetic data files
      ansible.builtin.fetch:
        src: "{{ item.path }}"
        dest: "{{ playbook_dir }}/../../data/"
        flat: true
      loop: "{{ data_files.files }}"

    - name: Summary
      ansible.builtin.debug:
        msg: >-
          Fetched {{ result_files.files | length }} result files + {{ db_log_files.files | length }} logs
          + {{ data_files.files | length }} data files to investigations/.
          {{ 'Benchmarks still running — run this playbook again later for final results.'
             if pid_files.files | length > 0
             else 'All benchmarks finished.' }}
          {{ err_files.files | length ~ ' database(s) had errors — check .err sentinels and error logs.'
             if err_files.files | length > 0
             else '' }}

- name: Fetch calibration and metrics from database hosts
  hosts: databases

  vars:
    local_results_dir: "{{ playbook_dir }}/../../results/"

  tasks:
    - name: Check for system metrics
      ansible.builtin.stat:
        path: /opt/benchmark/results/system-metrics.jsonl
      register: metrics_file

    - name: Fetch system metrics
      ansible.builtin.fetch:
        src: /opt/benchmark/results/system-metrics.jsonl
        dest: "{{ local_results_dir }}{{ db_role }}-system-metrics.jsonl"
        flat: true
      when: metrics_file.stat.exists

    - name: Check for calibration file
      ansible.builtin.stat:
        path: /opt/benchmark/results/calibration.json
      register: calibration_file

    - name: Fetch calibration file
      ansible.builtin.fetch:
        src: /opt/benchmark/results/calibration.json
        dest: "{{ local_results_dir }}{{ db_role }}-calibration.json"
        flat: true
      when: calibration_file.stat.exists
