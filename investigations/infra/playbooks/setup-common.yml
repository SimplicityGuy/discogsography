---
# Common setup for all benchmark hosts: Docker, monitoring tools.
#
# Usage:
#   ansible-playbook playbooks/setup-common.yml

- name: Common setup for all benchmark hosts
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 120

    - name: Gather facts
      ansible.builtin.setup:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - sysstat
          - iotop
          - htop
          - jq
          - python3-pip
          - python3-venv
          - sudo
        state: present

    - name: Create Docker keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/debian/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Start and enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Create benchmark directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/benchmark
        - /opt/benchmark/results

    - name: Deploy metrics collector script
      ansible.builtin.template:
        src: ../templates/metrics-collector.sh.j2
        dest: /opt/benchmark/metrics-collector.sh
        mode: "0755"

- name: Create interactive user on controller
  hosts: controller
  become: true

  tasks:
    - name: Create bench user
      ansible.builtin.user:
        name: bench
        shell: /bin/bash
        groups: sudo,docker
        append: true
        create_home: true

    - name: Allow passwordless sudo for bench user
      ansible.builtin.copy:
        content: "bench ALL=(ALL) NOPASSWD:ALL\n"
        dest: /etc/sudoers.d/bench
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Copy SSH authorized key to bench user
      ansible.posix.authorized_key:
        user: bench
        key: "{{ lookup('file', '~/.ssh/benchmark-key.pub') }}"
        state: present
