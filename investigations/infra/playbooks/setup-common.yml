---
# Common setup for all benchmark hosts: Docker, monitoring tools.
#
# The controller play runs first so its ControlMaster SSH socket is
# established before ProxyCommand connections to database hosts.
#
# Usage:
#   ansible-playbook playbooks/setup-common.yml

- name: Establish SSH to controller first
  hosts: controller
  become: true
  gather_facts: false

  tasks:
    - name: Wait for controller SSH to become available
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 120

- name: Common setup for all benchmark hosts
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 300

    - name: Gather facts
      ansible.builtin.setup:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install monitoring and utility packages
      ansible.builtin.apt:
        name:
          - sysstat
          - iotop
          - htop
          - jq
          - python3-pip
          - python3-venv
          - sudo
        state: present

    - name: Install Docker via geerlingguy.docker
      ansible.builtin.include_role:
        name: geerlingguy.docker
      vars:
        docker_install_compose_plugin: true

    - name: Create benchmark directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/benchmark
        - /opt/benchmark/results

    - name: Deploy metrics collector script
      ansible.builtin.template:
        src: ../templates/metrics-collector.sh.j2
        dest: /opt/benchmark/metrics-collector.sh
        mode: "0755"

- name: Create interactive user on controller
  hosts: controller
  become: true

  tasks:
    - name: Create bench user
      ansible.builtin.user:
        name: bench
        shell: /bin/bash
        groups: sudo,docker
        append: true
        create_home: true

    - name: Allow passwordless sudo for bench user
      ansible.builtin.copy:
        content: "bench ALL=(ALL) NOPASSWD:ALL\n"
        dest: /etc/sudoers.d/bench
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Copy SSH authorized key to bench user
      ansible.posix.authorized_key:
        user: bench
        key: "{{ lookup('file', '~/.ssh/benchmark-key.pub') }}"
        state: present
