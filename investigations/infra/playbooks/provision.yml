---
# Provision benchmark hosts on Hetzner Cloud.
#
# Creates a controller (CX33) + database hosts (CX53), a private network,
# and two firewalls (controller: SSH from internet, databases: private network only).
#
# Usage:
#   ansible-playbook playbooks/provision.yml --ask-vault-pass
#
# Wave mode (subset of databases):
#   ansible-playbook playbooks/provision.yml --ask-vault-pass \
#       -e '{"active_dbs": ["neo4j", "memgraph", "age", "falkordb"]}'
#
# Requires:
#   - HCLOUD_TOKEN in vault.yml or environment
#   - SSH key at ~/.ssh/benchmark-key.pub
#   - ansible-galaxy collection install hetzner.hcloud

- name: Provision benchmark hosts on Hetzner Cloud
  hosts: localhost
  connection: local
  vars_files:
    - ../vault.yml
  vars:
    hcloud_token: "{{ vault_hcloud_token }}"
    controller_type: cx33
    db_type: cx53
    image: debian-13
    location: nbg1
    ssh_key_name: benchmark-key
    controller_ip: "10.0.1.1"

    # All possible database servers — lookup table keyed by short name
    all_db_specs:
      neo4j: {name: bench-neo4j, role: neo4j, private_ip: "10.0.1.10"}
      memgraph: {name: bench-memgraph, role: memgraph, private_ip: "10.0.1.11"}
      age: {name: bench-age, role: age, private_ip: "10.0.1.12"}
      falkordb: {name: bench-falkordb, role: falkordb, private_ip: "10.0.1.13"}
      arangodb: {name: bench-arangodb, role: arangodb, private_ip: "10.0.1.14"}

    # Override with -e '{"active_dbs": ["neo4j", "memgraph"]}' to provision a subset.
    # Servers already created are idempotent (state: present returns existing info).
    _all_db_names: "{{ all_db_specs | list }}"
    active_db_names: "{{ active_dbs | default(_all_db_names) }}"
    db_servers: "{{ active_db_names | map('extract', all_db_specs) | list }}"

  tasks:
    - name: Upload SSH key to Hetzner
      hetzner.hcloud.ssh_key:
        api_token: "{{ hcloud_token }}"
        name: "{{ ssh_key_name }}"
        public_key: "{{ lookup('file', '~/.ssh/benchmark-key.pub') }}"
        state: present

    - name: Create private network
      hetzner.hcloud.network:
        api_token: "{{ hcloud_token }}"
        name: bench-network
        ip_range: 10.0.0.0/16
        state: present
      register: network

    - name: Create subnet
      hetzner.hcloud.subnetwork:
        api_token: "{{ hcloud_token }}"
        network: bench-network
        ip_range: 10.0.1.0/24
        type: cloud
        network_zone: eu-central
        state: present

    - name: Create controller firewall (SSH from internet)
      hetzner.hcloud.firewall:
        api_token: "{{ hcloud_token }}"
        name: bench-fw-controller
        rules:
          - description: SSH from internet
            direction: in
            protocol: tcp
            port: "22"
            source_ips: ["0.0.0.0/0", "::/0"]
          - description: All traffic from private network
            direction: in
            protocol: tcp
            port: "1-65535"
            source_ips: ["10.0.0.0/16"]
        state: present

    - name: Create database firewall (private network only)
      hetzner.hcloud.firewall:
        api_token: "{{ hcloud_token }}"
        name: bench-fw-database
        rules:
          - description: SSH from private network
            direction: in
            protocol: tcp
            port: "22"
            source_ips: ["10.0.0.0/16"]
          - description: Database ports from private network
            direction: in
            protocol: tcp
            port: "5432-8529"
            source_ips: ["10.0.0.0/16"]
        state: present

    - name: Create controller server
      hetzner.hcloud.server:
        api_token: "{{ hcloud_token }}"
        name: bench-controller
        server_type: "{{ controller_type }}"
        image: "{{ image }}"
        location: "{{ location }}"
        ssh_keys: ["{{ ssh_key_name }}"]
        firewalls: ["bench-fw-controller"]
        state: present
      register: controller_result

    - name: Create database servers
      hetzner.hcloud.server:
        api_token: "{{ hcloud_token }}"
        name: "{{ item.name }}"
        server_type: "{{ db_type }}"
        image: "{{ image }}"
        location: "{{ location }}"
        ssh_keys: ["{{ ssh_key_name }}"]
        firewalls: ["bench-fw-database"]
        state: present
      loop: "{{ db_servers }}"
      register: db_results

    - name: Attach controller to private network
      hetzner.hcloud.server_network:
        api_token: "{{ hcloud_token }}"
        server: bench-controller
        network: bench-network
        ip: "{{ controller_ip }}"
        state: present

    - name: Attach database servers to private network
      hetzner.hcloud.server_network:
        api_token: "{{ hcloud_token }}"
        server: "{{ item.name }}"
        network: bench-network
        ip: "{{ item.private_ip }}"
        state: present
      loop: "{{ db_servers }}"

    - name: Wait for controller SSH
      ansible.builtin.wait_for:
        host: "{{ controller_result.hcloud_server.ipv4_address }}"
        port: 22
        delay: 10
        timeout: 120

    - name: Generate inventory file
      vars:
        ctrl_ip: "{{ controller_result.hcloud_server.ipv4_address }}"
        proxy_cmd: >-
          ssh -i ~/.ssh/benchmark-key
          -o StrictHostKeyChecking=no
          -o UserKnownHostsFile=/dev/null
          -W %h:%p root@{{ controller_result.hcloud_server.ipv4_address }}
      ansible.builtin.copy:
        content: |
          ---
          all:
            vars:
              ansible_user: root
              ansible_ssh_private_key_file: ~/.ssh/benchmark-key
              ansible_python_interpreter: /usr/bin/python3
            children:
              controller:
                hosts:
                  bench-controller:
                    ansible_host: {{ ctrl_ip }}
              databases:
                vars:
                  ansible_ssh_common_args: '-o ProxyCommand="{{ proxy_cmd }}"'
                hosts:
          {% for result in db_results.results | default([]) %}
                  {{ result.hcloud_server.name }}:
                    ansible_host: {{ result.item.private_ip }}
                    db_role: {{ result.item.role }}
          {% endfor %}
        dest: ../inventory/hosts.yml

    - name: Display provisioned infrastructure
      ansible.builtin.debug:
        msg: >
          Controller: {{ controller_result.hcloud_server.ipv4_address }}.
          DB servers ({{ db_servers | length }}): {{ db_servers | map(attribute='name') | join(', ') }}.
