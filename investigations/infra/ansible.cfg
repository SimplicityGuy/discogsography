[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
timeout = 30
# Suppress INJECT_FACTS_AS_VARS deprecation — many Galaxy roles (e.g.
# geerlingguy.docker) still use ansible_* facts as top-level variables.
inject_facts_as_vars = True

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
